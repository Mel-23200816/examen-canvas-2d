<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caza de Latas y Patos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="container-fluid d-flex justify-content-center align-items-center vh-100">
        
        <div id="game-container" class="position-relative overflow-hidden glass-panel">
            
            <div class="ui-overlay d-flex justify-content-between p-3 w-100">
                <div class="stats-box text-white">
                    <p class="m-0 small text-uppercase fw-bold">Nivel: <span id="level">1</span></p>
                    <h3 class="m-0 fw-bold text-success">Puntos: <span id="score">0</span></h3>
                </div>
                <div class="stats-box text-white text-end">
                    <p class="m-0 small text-uppercase fw-bold">Récord</p>
                    <h3 class="m-0 text-warning"><span id="high-score">0</span></h3>
                </div>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>
        
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
